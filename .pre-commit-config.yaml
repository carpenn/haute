repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: frontend-lint
        name: Frontend lint
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: '^frontend/src/.*\.(ts|tsx)$'
        pass_filenames: false
