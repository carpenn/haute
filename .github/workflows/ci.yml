name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check src/

      - name: Mypy type check
        run: uv run mypy src/haute/

      - name: Tests with coverage
        run: uv run pytest tests/ -q --cov=src/haute --cov-branch --cov-report=term-missing --cov-fail-under=60

      - name: Verify wheel builds
        run: uv build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test
