site_name: Haute
site_description: Open-source pricing engine for insurance teams
site_url: https://haute.dev
repo_url: https://github.com/pricingfrontier/haute
repo_name: pricingfrontier/haute

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: slate
      primary: black
      accent: pink
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: pink
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.tabs.link
    - content.tabs
    - content.code.copy
    - content.code.annotate
    - navigation.footer
    - navigation.indexes
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.instant
    - navigation.instant.progress
    - navigation.top
    - navigation.sections
    - search.suggest
    - search.highlight
    - toc.follow
    - announce.dismiss
  icon:
    repo: fontawesome/brands/github
    logo: material/fire

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pricingfrontier/haute
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/ralph-clayton/

extra_css:
  - stylesheets/extra.css

dev_addr: 127.0.0.1:8001

copyright: Copyright &copy; 2025 Pricing Frontier LTD. Licensed under AGPL-3.0.

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - def_list
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true

nav:
  - Haute: index.md
  - Getting Started:
    - getting-started/index.md
    - Setting Up Your Environment: getting-started/environment.md
    - Installing Haute: getting-started/installing-haute.md
  - Deployment:
    - Overview: deployment/index.md
    - Before You Start: deployment/before-you-start.md
    - Targets:
      - Databricks: deployment/targets/databricks.md
      - Docker: deployment/targets/docker.md
      - AWS ECS: deployment/targets/aws.md
      - Azure Container Apps: deployment/targets/azure.md
    - CI/CD:
      - GitHub Actions: deployment/ci/github-actions.md
      - GitLab CI/CD: deployment/ci/gitlab.md
      - Azure DevOps: deployment/ci/azure-devops.md
  - Building Models: building-models/index.md
